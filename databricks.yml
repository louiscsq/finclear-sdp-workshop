bundle:
  name: finclear-sdp-workshop

include:
  - resources/*.yml

# Parametrized so FinClear can retarget catalog/schema without touching pipeline SQL.
variables:
  catalog:
    description: Target Unity Catalog
    default: finclear_demo
  schema:
    description: Target schema for the medallion tables
    default: sdp_workshop
  volume:
    description: Landing volume for the Artie-style CDC change files
    default: artie_cdc
  warehouse_id:
    description: SQL warehouse backing the AI/BI dashboard
    default: 757ed630ccf6bac1
  files_entities:
    description: Comma-separated entities delivered as an append-only file feed; the rest use Artie merge-in-place (CDF)
    default: securities

targets:
  # Development target — isolated schema, pipeline in dev mode (fast iteration).
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-finclear-sdp-demo.cloud.databricks.com
    variables:
      # FEVM-provisioned managed catalog for this demo workspace.
      catalog: finclear_sdp_demo_catalog

  # Production target — separate schema, illustrates dev→prod promotion (Week-4 DevOps story).
  prod:
    mode: production
    workspace:
      host: https://fevm-finclear-sdp-demo.cloud.databricks.com
    variables:
      catalog: finclear_sdp_demo_catalog
      schema: sdp_workshop_prod

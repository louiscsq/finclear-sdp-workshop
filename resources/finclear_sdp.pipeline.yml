resources:
  pipelines:
    finclear_sdp:
      name: finclear-sdp-workshop-${bundle.target}
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      photon: true
      channel: CURRENT
      libraries:
        - glob:
            include: ../pipeline/transformations/**
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}
        src_schema: ${var.schema}          # where Artie's src_<entity> tables live (cdf mode)
        ingest_mode: ${var.ingest_mode}     # 'cdf' (merge-in-place, default) | 'files'
        source_volume: /Volumes/${var.catalog}/${var.schema}/${var.volume}  # files mode
      # Cost-attribution tags (surface in the pipeline UI; see docs for serverless
      # budget-policy tagging that flows tags into system.billing.usage).
      tags:
        project: finclear-sdp-accelerator
        cost_center: finclear-workshop
        layer: medallion

resources:
  pipelines:
    finclear_sdp:
      name: finclear-sdp-workshop-${bundle.target}
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      photon: true
      channel: CURRENT
      libraries:
        - glob:
            include: ../pipeline/transformations/**
      configuration:
        catalog: ${var.catalog}            # read by bronze.py to locate external src_<entity> tables
        src_schema: ${var.schema}          # where Artie's src_<entity> tables live (cdf lane)
        files_entities: ${var.files_entities}   # entities via append-only files; the rest via CDF
        source_volume: /Volumes/${var.catalog}/${var.schema}/${var.volume}  # files lane
      # Cost-attribution tags (surface in the pipeline UI; see docs for serverless
      # budget-policy tagging that flows tags into system.billing.usage).
      tags:
        project: finclear-sdp-accelerator
        cost_center: finclear-workshop
        layer: medallion
